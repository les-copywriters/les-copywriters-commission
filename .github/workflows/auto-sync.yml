name: Auto Sync

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  sync:
    name: Sync all data sources
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ]; then
            echo "ERROR: SUPABASE_URL secret is not set."
            echo "Go to repo Settings → Secrets and variables → Actions and add SUPABASE_URL = https://irzeiiamxwccjwbjqnza.supabase.co"
            exit 1
          fi
          if [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "ERROR: CRON_SECRET secret is not set."
            echo "Go to repo Settings → Secrets and variables → Actions and add CRON_SECRET = <your cron secret>"
            exit 1
          fi
          echo "Secrets validated."
          echo "Calling scheduled sync functions on ${{ secrets.SUPABASE_URL }}"

      - name: Trigger scheduled syncs
        run: |
          run_sync() {
            local function_name="$1"
            local allowed_status_1="$2"
            local allowed_status_2="$3"
            local output_file="/tmp/${function_name}_response.json"

            echo "Triggering ${function_name}..."
            HTTP_CODE=$(curl -s \
              -o "${output_file}" \
              -w "%{http_code}" \
              -X POST "${{ secrets.SUPABASE_URL }}/functions/v1/${function_name}" \
              -H "Content-Type: application/json" \
              -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
              --max-time 300 \
              -d '{}')

            echo "HTTP status: $HTTP_CODE"
            echo "Response:"
            cat "${output_file}" | python3 -m json.tool 2>/dev/null || cat "${output_file}"

            if [ "$HTTP_CODE" != "$allowed_status_1" ] && [ "$HTTP_CODE" != "$allowed_status_2" ]; then
              echo "${function_name} failed with HTTP $HTTP_CODE"
              exit 1
            fi
          }

          run_sync sync-jotform 200 200
          run_sync schedule-setter-dashboard-sync 200 207

          echo "Scheduled syncs completed successfully."
